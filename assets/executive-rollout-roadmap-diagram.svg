<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941">
  <defs>
    <style>
      .bg { fill: #fff; }
      .title { font: 700 52px Arial, sans-serif; fill: #08265a; letter-spacing: 3px; }
      .subtitle { font: 400 28px Arial, sans-serif; fill: #172033; }
      .num { font: 700 40px Arial, sans-serif; fill: #fff; }
      .head { font: 700 20px Arial, sans-serif; fill: #fff; }
      .body { font: 400 20px Arial, sans-serif; fill: #172033; }
      .gate { font: 700 18px Arial, sans-serif; fill: #08265a; }
      .small { font: 400 16px Arial, sans-serif; fill: #172033; }
      .navy { fill: #08265a; }
      .teal { fill: #0f766e; }
      .gold { fill: #bd8a00; }
      .card { fill: #fff; stroke: #d9e0ea; stroke-width: 2; }
      .line { stroke: #08265a; stroke-width: 5; }
      .dash { stroke-width: 3; stroke-dasharray: 4 8; }
    </style>
  </defs>
  <rect class="bg" width="1672" height="941"/>
  <text x="836" y="82" text-anchor="middle" class="title">HEALTHCARE AI CODING PLATFORM</text>
  <text x="836" y="136" text-anchor="middle" class="title" style="font-size:36px;fill:#0f766e">EXECUTIVE ROLLOUT ROADMAP</text>
  <text x="836" y="190" text-anchor="middle" class="subtitle">Controlled rollout from foundations to PHI enablement with gates at every phase.</text>

  <line x1="118" y1="282" x2="1554" y2="282" class="line"/>
  <g transform="translate(70 235)">
    <circle cx="48" cy="47" r="46" class="navy"/><text x="48" y="61" text-anchor="middle" class="num">0</text>
  </g>
  <g transform="translate(310 235)">
    <circle cx="48" cy="47" r="46" class="teal"/><text x="48" y="61" text-anchor="middle" class="num">1</text>
  </g>
  <g transform="translate(550 235)">
    <circle cx="48" cy="47" r="46" class="teal"/><text x="48" y="61" text-anchor="middle" class="num">2</text>
  </g>
  <g transform="translate(790 235)">
    <circle cx="48" cy="47" r="46" class="navy"/><text x="48" y="61" text-anchor="middle" class="num">3</text>
  </g>
  <g transform="translate(1030 235)">
    <circle cx="48" cy="47" r="46" class="gold"/><text x="48" y="61" text-anchor="middle" class="num">4</text>
  </g>
  <g transform="translate(1270 235)">
    <circle cx="48" cy="47" r="46" class="teal"/><text x="48" y="61" text-anchor="middle" class="num">5</text>
  </g>
  <g transform="translate(1510 235)">
    <circle cx="48" cy="47" r="46" class="gold"/><text x="48" y="61" text-anchor="middle" class="num">6</text>
  </g>

  <g transform="translate(26 360)">
    <rect width="218" height="360" rx="12" class="card"/>
    <rect width="218" height="62" rx="12" class="navy"/><text x="109" y="40" text-anchor="middle" class="head">FOUNDATIONS</text>
    <text x="109" y="170" text-anchor="middle" class="body">Build core platform:</text>
    <text x="109" y="196" text-anchor="middle" class="body">Kong, policy service,</text>
    <text x="109" y="222" text-anchor="middle" class="body">Mantle Responses,</text>
    <text x="109" y="248" text-anchor="middle" class="body">metering, observability.</text>
    <line x1="109" y1="360" x2="109" y2="414" class="line dash"/>
    <rect x="0" y="414" width="218" height="82" rx="10" class="card"/>
    <text x="109" y="452" text-anchor="middle" class="gate">GATE:</text>
    <text x="109" y="472" text-anchor="middle" class="small">Threat model +</text>
    <text x="109" y="492" text-anchor="middle" class="small">store=false</text>
  </g>

  <g transform="translate(264 360)">
    <rect width="218" height="360" rx="12" class="card"/>
    <rect width="218" height="62" rx="12" class="teal"/><text x="109" y="40" text-anchor="middle" class="head">SYNTHETIC PILOT</text>
    <text x="109" y="170" text-anchor="middle" class="body">3-5 managed developer</text>
    <text x="109" y="196" text-anchor="middle" class="body">environments with</text>
    <text x="109" y="222" text-anchor="middle" class="body">synthetic repositories</text>
    <text x="109" y="248" text-anchor="middle" class="body">only.</text>
    <line x1="109" y1="360" x2="109" y2="414" class="line dash" style="stroke:#0f766e"/>
    <rect x="0" y="414" width="218" height="82" rx="10" class="card"/>
    <text x="109" y="452" text-anchor="middle" class="gate" style="fill:#0f766e">GATE:</text>
    <text x="109" y="478" text-anchor="middle" class="small">No PHI leakage</text>
  </g>

  <g transform="translate(502 360)">
    <rect width="218" height="360" rx="12" class="card"/>
    <rect width="218" height="62" rx="12" class="teal"/><text x="109" y="40" text-anchor="middle" class="head">NON-PHI REPOS</text>
    <text x="109" y="170" text-anchor="middle" class="body">Approved SWE and PM</text>
    <text x="109" y="196" text-anchor="middle" class="body">users on non-PHI</text>
    <text x="109" y="222" text-anchor="middle" class="body">coding repositories.</text>
    <line x1="109" y1="360" x2="109" y2="414" class="line dash" style="stroke:#0f766e"/>
    <rect x="0" y="414" width="218" height="82" rx="10" class="card"/>
    <text x="109" y="452" text-anchor="middle" class="gate" style="fill:#0f766e">GATE:</text>
    <text x="109" y="478" text-anchor="middle" class="small">Finance validation</text>
  </g>

  <g transform="translate(740 360)">
    <rect width="218" height="360" rx="12" class="card"/>
    <rect width="218" height="62" rx="12" class="navy"/><text x="109" y="40" text-anchor="middle" class="head">DASHBOARDS</text>
    <text x="109" y="170" text-anchor="middle" class="body">Adoption, latency,</text>
    <text x="109" y="196" text-anchor="middle" class="body">failure, approval,</text>
    <text x="109" y="222" text-anchor="middle" class="body">model usage,</text>
    <text x="109" y="248" text-anchor="middle" class="body">and cost views.</text>
    <line x1="109" y1="360" x2="109" y2="414" class="line dash"/>
    <rect x="0" y="414" width="218" height="82" rx="10" class="card"/>
    <text x="109" y="452" text-anchor="middle" class="gate">GATE:</text>
    <text x="109" y="478" text-anchor="middle" class="small">Operating views</text>
  </g>

  <g transform="translate(978 360)">
    <rect width="218" height="360" rx="12" class="card"/>
    <rect width="218" height="62" rx="12" class="gold"/><text x="109" y="40" text-anchor="middle" class="head">FRONTIER MODELS</text>
    <text x="109" y="170" text-anchor="middle" class="body">Optional gated</text>
    <text x="109" y="196" text-anchor="middle" class="body">enablement of</text>
    <text x="109" y="222" text-anchor="middle" class="body">GPT-5.5 and</text>
    <text x="109" y="248" text-anchor="middle" class="body">GPT-5.4 aliases.</text>
    <line x1="109" y1="360" x2="109" y2="414" class="line dash" style="stroke:#bd8a00"/>
    <rect x="0" y="414" width="218" height="82" rx="10" class="card"/>
    <text x="109" y="452" text-anchor="middle" class="gate" style="fill:#8a6200">GATE:</text>
    <text x="109" y="478" text-anchor="middle" class="small">Compliance gate</text>
  </g>

  <g transform="translate(1216 360)">
    <rect width="218" height="360" rx="12" class="card"/>
    <rect width="218" height="62" rx="12" class="teal"/><text x="109" y="40" text-anchor="middle" class="head">APP CODING TRAFFIC</text>
    <text x="109" y="170" text-anchor="middle" class="body">/ai/dev/coding</text>
    <text x="109" y="196" text-anchor="middle" class="body">synthetic then</text>
    <text x="109" y="222" text-anchor="middle" class="body">production coding-only</text>
    <text x="109" y="248" text-anchor="middle" class="body">application traffic.</text>
    <line x1="109" y1="360" x2="109" y2="414" class="line dash" style="stroke:#0f766e"/>
    <rect x="0" y="414" width="218" height="82" rx="10" class="card"/>
    <text x="109" y="452" text-anchor="middle" class="gate" style="fill:#0f766e">GATE:</text>
    <text x="109" y="478" text-anchor="middle" class="small">Same controls</text>
  </g>

  <g transform="translate(1454 360)">
    <rect width="218" height="360" rx="12" class="card"/>
    <rect width="218" height="62" rx="12" class="gold"/><text x="109" y="40" text-anchor="middle" class="head">PHI ENABLEMENT</text>
    <text x="109" y="170" text-anchor="middle" class="body">Activate PHI workflows</text>
    <text x="109" y="196" text-anchor="middle" class="body">only after all approvals</text>
    <text x="109" y="222" text-anchor="middle" class="body">and safeguards</text>
    <text x="109" y="248" text-anchor="middle" class="body">are in place.</text>
    <line x1="109" y1="360" x2="109" y2="414" class="line dash" style="stroke:#bd8a00"/>
    <rect x="0" y="414" width="218" height="82" rx="10" class="card"/>
    <text x="109" y="452" text-anchor="middle" class="gate" style="fill:#8a6200">GATE:</text>
    <text x="109" y="478" text-anchor="middle" class="small">Separate approval</text>
  </g>
</svg>
